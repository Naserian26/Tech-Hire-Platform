<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 0; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%); color: white; padding: 30px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .content { padding: 30px 20px; color: #333; line-height: 1.6; }
        .job-card { background-color: #f0fdfa; border: 1px solid #99f6e4; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .job-title { font-size: 18px; font-weight: bold; color: #0f766e; margin-bottom: 5px; }
        .match-score { display: inline-block; background: #0d9488; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .btn { display: inline-block; background: #0d9488; color: white; padding: 12px 30px; text-decoration: none; border-radius: 50px; font-weight: 600; margin-top: 10px; }
        .footer { background-color: #f9fafb; padding: 20px; text-align: center; font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>New AI Match Found! 🤖</h1>
        </div>
        <div class="content">
            <p>Hi <strong>{{ candidate_name }}</strong>,</p>
            <p>Our AI engine found a job that perfectly matches your profile.</p>
            
            <div class="job-card">
                <div class="job-title">{{ job_title }}</div>
                <p style="margin: 5px 0; color: #555;">at <strong>{{ company_name }}</strong></p>
                <div style="margin-top: 10px;">
                    <span class="match-score">{{ match_score }}% Match</span>
                </div>
            </div>
            
            <div style="text-align: center;">
                <a href="{{ frontend_url }}/seeker/jobs/{{ job_id }}" class="btn">Apply Now</a>
            </div>
        </div>
        <div class="footer">
            <p>TechHire Platform - AI Powered Recruitment</p>
        </div>
    </div>
</body>
</html>
